name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff lint
        run: uv run ruff check

      - name: Run ruff format
        run: uv run ruff format --check

      - name: Run tests
        run: uv run pytest
